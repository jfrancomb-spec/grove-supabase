project_id = "grove-supabase"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:8000"
additional_redirect_urls = [
  "http://127.0.0.1:8000",
  "http://127.0.0.1:8000/caregiver.html",
  "http://127.0.0.1:8000/family.html"
]
jwt_expiry = 3600

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
